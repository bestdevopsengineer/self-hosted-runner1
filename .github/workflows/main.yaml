name: Linux CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: [self-hosted, linux, dev]
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          echo "Running on Linux runner"
          uname -a

      - name: Test internal access
        run: |
          ping -c 1 10.0.0.5



